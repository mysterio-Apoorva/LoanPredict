<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LoanPredict — AI Loan Intelligence{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="nav-logo">LoanPredict</a>
            <ul class="nav-links">
                <li><a href="{{ url_for('home') }}" {% if request.endpoint == 'home' %}class="active"{% endif %}>Home</a></li>
                <li><a href="{{ url_for('predict') }}" {% if request.endpoint == 'predict' %}class="active"{% endif %}>Predict</a></li>
                <li><a href="{{ url_for('introduction') }}" {% if request.endpoint == 'introduction' %}class="active"{% endif %}>Introduction</a></li>
                <li><a href="{{ url_for('future_scope') }}" {% if request.endpoint == 'future_scope' %}class="active"{% endif %}>Future Scope</a></li>
                <li><a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>About</a></li>
            </ul>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <footer>
        <p>© 2026 LoanPredict &nbsp;·&nbsp; Built with Python & Scikit-learn</p>
    </footer>
    <script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function () {
                const btn = this.querySelector('button[type="submit"]');
                if (btn) { btn.textContent = 'Analyzing…'; btn.style.opacity = '0.7'; }
            });
        });
    </script>
</body>
</html>
